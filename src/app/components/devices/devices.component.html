<div class="content_container">
  @if (devices().length !== 0) {
    <div class="content_devices">
      <mat-grid-list cols="4" rowHeight="280px" gutterSize="12px">
        <!-- <mat-grid-tile [rowspan]="0.5">
          <div class="box">
            <div class="box_header">
              <h3 class="box_title">Devices online</h3>
            </div>
            <h1>{{ devicesOnline() }}</h1>
          </div>
        </mat-grid-tile>
        <mat-grid-tile [rowspan]="0.5">
          <div class="box">
            <div class="box_header">
              <h3 class="box_title">Devices offline</h3>
            </div>
            <h1>{{ devices().length - devicesOnline() }}</h1>
          </div>
        </mat-grid-tile>
        <mat-grid-tile [rowspan]="0.5">
          <div class="box">
            <div class="box_header">
              <h3 class="box_title">Average Value</h3>
            </div>
            <h1>{{ devicesAvg() }}</h1>
          </div>
        </mat-grid-tile> -->
        @for (device of devices(); track device.id) {
          <!-- widgetMap[device.widget.widgetType];
    inputs: { device: device } -->
          <mat-grid-tile
            [routerLink]="['/devices', device.id]"
            [rowspan]="layputRowspan[device.id]"
            [colspan]="layputColumns[device.id]"
          >
            <mat-card class="device_card">
              <mat-card-header>
                <mat-card-title>{{ device.name }}</mat-card-title>
                @if (device.status) {
                  <mat-chip
                    [class.online]="device.status === 'online'"
                    [class.offline]="device.status !== 'online'"
                    >{{ device.status }}</mat-chip
                  >
                }
              </mat-card-header>
              @for (widget of widgets(); track widget.widgetId) {
                @if (widget.deviceId === device.id) {
                  <mat-card-content>
                    <app-widget [widget]="widget"></app-widget>
                  </mat-card-content>
                }
              }
            </mat-card>
          </mat-grid-tile>
        }
      </mat-grid-list>
    </div>
  }
</div>
